name: LaTeX Derleme

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: LaTeX derle
        uses: xu-cheng/latex-action@v3
        continue-on-error: true
        with:
          root_file: ana-kitap.tex
          latexmk_use_lualatex: true
          extra_system_packages: "biber"
          # -f: force mode (henüz yayınlanmamış bölümlere atıflar çözümsüz kalabilir)
          args: "-lualatex -interaction=nonstopmode -file-line-error -f"

      - name: PDF oluşturuldu mu kontrol et
        run: |
          if [ ! -f ana-kitap.pdf ]; then
            echo "::error::PDF dosyası oluşturulamadı!"
            exit 1
          fi
          echo "PDF başarıyla oluşturuldu ($(du -h ana-kitap.pdf | cut -f1))"

      - name: PDF dosyalarını hazırla
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp ana-kitap.pdf bilgisayar-mimarisi.pdf
          cp ana-kitap.pdf bilgisayar-mimarisi-${{ github.ref_name }}.pdf

      - name: PDF'i artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: bilgisayar-mimarisi-pdf
          path: ana-kitap.pdf

      # Tag push edildiğinde Release oluştur/güncelle
      - name: GitHub Release oluştur
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bilgisayar-mimarisi.pdf
            bilgisayar-mimarisi-${{ github.ref_name }}.pdf
          name: "Bilgisayar Mimarisi ${{ github.ref_name }}"
          body: |
            ## Bilgisayar Mimarisi: RISC-V Tabanlı Yaklaşım

            **Sürüm**: ${{ github.ref_name }}

            PDF dosyasını indirmek için aşağıdaki bağlantıyı kullanın.
          draft: false
          prerelease: false
          overwrite_files: true
